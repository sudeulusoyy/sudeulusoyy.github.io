<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uyanma Vakti!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* Tıklama parlamasını gizler */
            transition: background 1.5s ease-in-out;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1e2e 100%);
        }
        
        /* HER TIKLAMAYI YAKALAYACAK GÖRÜNMEZ KATMAN */
        #touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            cursor: pointer;
        }

        .container {
            text-align: center;
            z-index: 10;
            max-width: 80%;
            padding: 40px;
            pointer-events: none; /* Metinlerin tıklanmayı engellemesini önler */
        }
        .stage-text {
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.2rem;
            letter-spacing: 2px;
            line-height: 1.4;
            opacity: 1;
            transform: scale(1);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 10px rgba(100, 149, 237, 0.5), 0 0 20px rgba(100, 149, 237, 0.2);
        }
        .stage-text.phase-2 {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.7), 0 0 20px rgba(255, 0, 127, 0.4);
        }
        .stage-text.phase-3 {
            font-family: 'Montserrat', sans-serif;
            font-style: normal;
            font-weight: 700;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b91c1c;
            text-shadow: none;
            line-height: 1.1;
        }
        .fade-out { opacity: 0; transform: scale(0.95); }
        .hint {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 2.5s infinite;
            pointer-events: none;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        .emoji {
            position: absolute;
            top: -60px;
            font-size: 2.5rem;
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div style="display:none; background: linear-gradient(180deg, #FF9E7D 0%, #FFD700 100%);"></div>

    <div id="touch-layer"></div>

    <div class="container">
        <h1 id="stage-text" class="stage-text">Öğlen oldu öğlen...</h1>
    </div>
    
    <div id="hint" class="hint">Devam Etmek İçin Dokun</div>

    <script>
        const textEl = document.getElementById('stage-text');
        const hintEl = document.getElementById('hint');
        const touchLayer = document.getElementById('touch-layer'); // Görünmez katmanı seçtik
        
        let step = 1;
        let isTransitioning = false; // Hızlı hızlı tıklanıp bozulmasını engeller
        
        const wakeUpEmojis = ['⏰', '☕', '🐓', '📢', '🌞', '🙄'];

        function handleTap(e) {
            e.preventDefault(); // Ekranın kaymasını vb. önler
            if (isTransitioning) return; 

            if (step === 1) {
                isTransitioning = true;
                performTextTransition("Bugün de uyanamadın galiba 😒", "phase-2");
                step = 2;
                setTimeout(() => { isTransitioning = false; }, 800);
            } 
            else if (step === 2) {
                isTransitioning = true;
                hintEl.style.display = 'none';
                textEl.classList.add('fade-out');
                
                setTimeout(() => {
                    document.body.style.background = "linear-gradient(180deg, #FF9E7D 0%, #FFD700 100%)";
                    textEl.innerText = "KALK ARTIK KALK!!!";
                    textEl.className = "stage-text phase-3";
                    textEl.classList.remove('fade-out');
                    startEmojiRain();
                }, 500);
                
                step = 3;
            }
        }

        // TELEFON VE BİLGİSAYAR İÇİN KESİN TIKLAMA ÇÖZÜMÜ
        touchLayer.addEventListener('pointerdown', handleTap);

        function performTextTransition(newText, newClass) {
            textEl.classList.add('fade-out');
            setTimeout(() => {
                textEl.innerText = newText;
                if(newClass) textEl.classList.add(newClass);
                textEl.classList.remove('fade-out');
            }, 600);
        }

        function startEmojiRain() {
            let emojiCount = 0;
            const emojiTimer = setInterval(() => {
                const emojiEl = document.createElement('div');
                emojiEl.classList.add('emoji');
                emojiEl.innerText = wakeUpEmojis[Math.floor(Math.random() * wakeUpEmojis.length)];
                
                const scale = Math.random() * 1.5 + 0.8;
                emojiEl.style.left = Math.random() * 100 + 'vw';
                emojiEl.style.transform = `scale(${scale})`;
                
                const duration = Math.random() * 2 + 1.2;
                emojiEl.style.animationDuration = duration + 's';
                
                document.body.appendChild(emojiEl);

                setTimeout(() => {
                    emojiEl.remove();
                }, duration * 1000);

                emojiCount++;
                if(emojiCount > 50) clearInterval(emojiTimer);
            }, 250);
        }
    </script>
</body>
</html>
