<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Özel Bir Sürpriz!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Daha soft pudra pembesi tonları */
            background: linear-gradient(180deg, #ffe6f2 0%, #ffcce6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif; /* Görseldeki gibi daha zarif ve şık bir font */
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }
        .top-text {
            position: absolute;
            top: 50px;
            color: #d81b60; /* Yazılar için tatlı, uyumlu bir koyu pembe */
            font-size: 1.1rem;
            letter-spacing: 5px; /* Harflerin arasını açarak o şık görüntüyü verir */
            font-weight: bold;
            opacity: 0.7;
        }
        .center-container {
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .click-me {
            color: #c2185b;
            font-size: 1.3rem;
            letter-spacing: 3px;
            animation: pulse 1.5s infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .click-me-icon {
            font-size: 4rem; /* Tıkla bana yazısının üstündeki büyük portakal */
        }
        .message-box {
            display: none; /* Başlangıçta gizli */
            color: #ad1457;
            font-size: 1.4rem;
            line-height: 1.8;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px); /* Aşağıdan yukarı tatlı bir geliş efekti */
            transition: all 1s ease;
        }
        .message-box.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        .balim {
            font-size: 2.2rem;
            color: #d81b60;
            display: block;
            margin-top: 15px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .emoji {
            position: absolute;
            top: -50px;
            font-size: 2rem;
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="top-text">SANA ÖZEL BİR SÜRPRİZ</div>

    <div class="center-container">
        <div class="click-me" id="click-me">
            <span class="click-me-icon">🍊</span>
            <span>TIKLA BANA</span>
        </div>

        <div class="message-box" id="message-box">
            Antalya'nın portakalı,<br>
            Finike'nin kaymağı...
            <span class="balim">Günaydın Balım! ☀️🍯</span>
        </div>
    </div>

    <script>
        const emojis = ['☀️', '🍯', '🧡', '🍊'];
        let isClicked = false;
        
        document.body.addEventListener('click', (e) => {
            // İlk tıklamayı algıla ve yazıları değiştir
            if (!isClicked) {
                document.getElementById('click-me').style.display = 'none';
                const msgBox = document.getElementById('message-box');
                msgBox.style.display = 'block';
                
                // Animasyonun yumuşak çalışması için minik bir gecikme
                setTimeout(() => {
                    msgBox.classList.add('show');
                }, 50);
                
                isClicked = true;
            }
            
            // Her tıklamada rastgele sayıda (3-5 arası) emoji düşür
            const dropCount = Math.floor(Math.random() * 3) + 3; 
            
            for(let i = 0; i < dropCount; i++) {
                setTimeout(() => {
                    const emojiEl = document.createElement('div');
                    emojiEl.classList.add('emoji');
                    emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    
                    // Ekranın rastgele bir yerinden düşsün
                    emojiEl.style.left = Math.random() * 100 + 'vw';
                    
                    const duration = Math.random() * 2.5 + 2; 
                    emojiEl.style.animationDuration = duration + 's';
                    emojiEl.style.fontSize = (Math.random() * 1.5 + 1.2) + 'rem'; 
                    
                    document.body.appendChild(emojiEl);

                    // Ekranda birikmemeleri için animasyon bitince sil
                    setTimeout(() => {
                        emojiEl.remove();
                    }, duration * 1000);
                }, i * 150); 
            }
        });
    </script>
</body>
</html>
